const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function go(){
  const pw=document.getElementById('pw').value;
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
    const doc=new DOMParser().parseFromString(new TextDecoder().decode(pt),'text/html');
    const l=doc.createElement('link'); l.rel='stylesheet';
    l.href='https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap';
    doc.head.prepend(l);
    document.open();
    document.write('<!DOCTYPE html>', doc.documentElement.outerHTML);
    document.close();
  }catch(e){ document.getElementById('err').textContent='Неверный пароль'; }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
